name: 每日候选股扫描

on:
  schedule:
    # 北京时间 14:30 = UTC 6:30, 周一到周五
    - cron: '30 6 * * 1-5'
  workflow_dispatch:
    inputs:
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 执行扫描
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
        run: python daily_scanner.py
